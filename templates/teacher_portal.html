<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        const FIREBASE_URL = "https://theemfuncgen-default-rtdb.asia-southeast1.firebasedatabase.app/";
        const userBranch = "{{ branch }}"; // Injected by Flask
        let currentStructure = [];

        async function loadStructure() {
            const sem = document.getElementById('sem_combo').value.replace(" ", "_");
            const tbody = document.getElementById('marks-body');
            tbody.innerHTML = ''; 
            try {
                // UPDATED: Now fetches from the specific branch
                const res = await fetch(`${FIREBASE_URL}/exam_structure/${userBranch}/${sem}.json`);
                const data = await res.json();
                
                if (data) {
                    currentStructure = data;
                    data.forEach((subj, idx) => {
                        const max_tot = subj.max_th + subj.max_ia + subj.max_tw + subj.max_op;
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="text-align: left; font-weight: 500;">${subj.name}</td>
                            <td><input type="text" class="grid-input readonly cr-val" value="${subj.cr}" readonly></td>
                            <td><input type="number" class="grid-input edit-val" value="0" data-idx="${idx}" data-max="${subj.max_th}" data-type="th"></td>
                            <td><input type="number" class="grid-input edit-val" value="0" data-idx="${idx}" data-max="${subj.max_ia}" data-type="ia"></td>
                            <td><input type="number" class="grid-input edit-val" value="0" data-idx="${idx}" data-max="${subj.max_tw}" data-type="tw"></td>
                            <td><input type="number" class="grid-input edit-val" value="0" data-idx="${idx}" data-max="${subj.max_op}" data-type="op"></td>
                            <td><input type="text" class="grid-input readonly tot-val" value="0" readonly></td>
                            <td><input type="text" class="grid-input readonly out-val" value="${max_tot}" readonly></td>
                            <td><input type="text" class="grid-input readonly g-val" value="0" readonly></td>
                            <td><input type="text" class="grid-input readonly cg-val" value="0" readonly></td>
                            <td><span class="status-badge" style="font-weight:bold;">PENDING</span></td>
                        `;
                        tbody.appendChild(tr);
                    });
                    attachEventListeners();
                }
            } catch (err) { console.error("Error loading structure:", err); }
        }

        function attachEventListeners() {
            const inputs = document.querySelectorAll('.edit-val');
            inputs.forEach(input => {
                input.addEventListener('keyup', (e) => calculateRow(e.target));
                input.addEventListener('keydown', handleArrowNav);
            });
        }

        function calculateRow(input) {
            const tr = input.closest('tr');
            const th = parseInt(tr.querySelector('[data-type="th"]').value) || 0;
            const ia = parseInt(tr.querySelector('[data-type="ia"]').value) || 0;
            const tw = parseInt(tr.querySelector('[data-type="tw"]').value) || 0;
            const op = parseInt(tr.querySelector('[data-type="op"]').value) || 0;
            const idx = input.getAttribute('data-idx');
            const subj = currentStructure[idx];
            
            const tot = th + ia + tw + op;
            const out = parseInt(tr.querySelector('.out-val').value);
            const perc = out > 0 ? (tot / out) * 100 : 0;
            
            const fail = (subj.max_th > 0 && th < (0.4 * subj.max_th)) || 
                         (subj.max_ia > 0 && ia < (0.4 * subj.max_ia)) || 
                         (subj.max_tw > 0 && tw < (0.4 * subj.max_tw)) || 
                         (subj.max_op > 0 && op < (0.4 * subj.max_op));
            
            let gp = 0;
            if (!fail) {
                if (perc >= 80) gp = 10; else if (perc >= 75) gp = 9; else if (perc >= 70) gp = 8;
                else if (perc >= 60) gp = 7; else if (perc >= 50) gp = 6; else if (perc >= 45) gp = 5; else if (perc >= 40) gp = 4;
            }
            const cg = parseInt(tr.querySelector('.cr-val').value) * gp;
            
            tr.querySelector('.tot-val').value = tot;
            tr.querySelector('.g-val').value = gp;
            tr.querySelector('.cg-val').value = cg;
            
            const badge = tr.querySelector('.status-badge');
            badge.textContent = fail ? "FAIL" : "PASS";
            badge.style.color = fail ? "var(--c-danger)" : "var(--c-success)";
            updateOverallStats();
        }

        function updateOverallStats() {
            let totalCr = 0, totalCg = 0, hasFail = false;
            document.querySelectorAll('#marks-body tr').forEach(tr => {
                const crInput = tr.querySelector('.cr-val');
                if (crInput) {
                    totalCr += parseInt(crInput.value) || 0;
                    totalCg += parseInt(tr.querySelector('.cg-val').value) || 0;
                    if (tr.querySelector('.status-badge').textContent === "FAIL") hasFail = true;
                }
            });
            const statsObj = document.getElementById('overall-stats');
            if (hasFail) {
                statsObj.innerHTML = `Total Cr: ${totalCr} | Total CG: ${totalCg} | SGPA: -- (FAILED)`;
                statsObj.style.color = "var(--c-danger)";
            } else {
                const sgpa = totalCr > 0 ? (totalCg / totalCr).toFixed(2) : "0.00";
                statsObj.innerHTML = `Total Cr: ${totalCr} | Total CG: ${totalCg} | SGPA: ${sgpa}`;
                statsObj.style.color = "var(--c-primary)";
            }
        }

        function handleArrowNav(e) {
            const inputs = Array.from(document.querySelectorAll('.edit-val'));
            const currentIdx = inputs.indexOf(e.target);
            const cols = 4;
            let targetIdx = null;
            if (e.key === "ArrowRight") targetIdx = currentIdx + 1;
            if (e.key === "ArrowLeft") targetIdx = currentIdx - 1;
            if (e.key === "ArrowDown") targetIdx = currentIdx + cols;
            if (e.key === "ArrowUp") targetIdx = currentIdx - cols;
            
            if (targetIdx !== null && targetIdx >= 0 && targetIdx < inputs.length) {
                e.preventDefault();
                inputs[targetIdx].focus(); inputs[targetIdx].select();
            }
        }

        async function searchStudent() {
            const gr = document.getElementById('search_gr').value.trim();
            const sem = document.getElementById('sem_combo').value.replace(" ", "_");
            if (!gr) return alert("Please enter a GR Number to search.");

            try {
                // UPDATED: Now fetches from the specific branch
                const res = await fetch(`${FIREBASE_URL}/students/${userBranch}/${sem}/${gr}.json`);
                const data = await res.json();
                
                if (data) {
                    document.getElementById('student_name').value = data.Name || "";
                    document.getElementById('gr_no').value = data["GR No"] || gr;

                    if (data.Subjects) {
                        const rows = document.querySelectorAll('#marks-body tr');
                        data.Subjects.forEach(storedSubj => {
                            rows.forEach(tr => {
                                const rowName = tr.cells[0].innerText;
                                if (rowName === storedSubj.Name) {
                                    tr.querySelector('[data-type="th"]').value = storedSubj.TH || 0;
                                    tr.querySelector('[data-type="ia"]').value = storedSubj.IA || 0;
                                    tr.querySelector('[data-type="tw"]').value = storedSubj.TW || 0;
                                    tr.querySelector('[data-type="op"]').value = storedSubj.OP || 0;
                                    calculateRow(tr.querySelector('[data-type="th"]')); // Trigger recalc
                                }
                            });
                        });
                    }
                    alert("Student record loaded.");
                } else {
                    alert("No student found with this GR Number in this semester.");
                }
            } catch (err) { alert("Failed to search data."); }
        }

        async function saveAndPDF() {
            const name = document.getElementById('student_name').value.trim();
            const gr = document.getElementById('gr_no').value.trim();
            const sem = document.getElementById('sem_combo').value.replace(" ", "_");

            if (!name || !gr) return alert("Student Name and GR Number are required.");

            let subjects_data = [];
            let allRows = document.querySelectorAll('#marks-body tr');
            
            allRows.forEach((tr, idx) => {
                subjects_data.push({
                    Name: tr.cells[0].innerText,
                    Credits: parseInt(tr.querySelector('.cr-val').value || 0),
                    TH: parseInt(tr.querySelector('[data-type="th"]').value || 0),
                    IA: parseInt(tr.querySelector('[data-type="ia"]').value || 0),
                    TW: parseInt(tr.querySelector('[data-type="tw"]').value || 0),
                    OP: parseInt(tr.querySelector('[data-type="op"]').value || 0),
                    Total: parseInt(tr.querySelector('.tot-val').value || 0),
                    Grade: parseInt(tr.querySelector('.g-val').value || 0),
                    CG: parseInt(tr.querySelector('.cg-val').value || 0),
                    Status: tr.querySelector('.status-badge').innerText
                });
            });

            const total_cg = subjects_data.reduce((sum, s) => sum + s.CG, 0);
            const total_cr = subjects_data.reduce((sum, s) => sum + s.Credits, 0);
            const sgpa = total_cr > 0 ? (total_cg / total_cr).toFixed(2) : "0.00";
            const status = subjects_data.every(s => s.Status === "PASS") ? "PASS" : "FAIL";

            const payload = {
                Name: name, "GR No": gr, SGPA: sgpa, Status: status,
                Teacher_ID: "{{ username }}", Subjects: subjects_data
            };

            try {
                // 1. Save to Firebase (UPDATED: specific branch)
                await fetch(`${FIREBASE_URL}/students/${userBranch}/${sem}/${gr}.json`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                
                // 2. Trigger PDF Download from Flask
                const pdfRes = await fetch('/download/single_result', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ name: name, gr_no: gr, branch: userBranch, subjects: subjects_data })
                });

                if (pdfRes.ok) {
                    const blob = await pdfRes.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${gr}_${name.replace(/ /g, "_")}_GradeCard.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    alert("Data saved, but PDF generation failed.");
                }
            } catch (err) { alert("Error saving data."); }
        }

        function resetForm() {
            document.getElementById('student_name').value = "";
            document.getElementById('gr_no').value = "";
            document.getElementById('search_gr').value = "";
            loadStructure();
        }

        window.onload = loadStructure;
    </script>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 0 20px; text-align: center;">
            <h2 style="color: var(--c-text-main);">FACULTY</h2>
            <div style="color: var(--c-primary); font-weight: bold; margin-bottom: 20px;">Branch: {{ branch }}</div>
            <div style="height: 140px; background: #f1f5f9; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: gray; margin: 20px 0;">No Photo</div>
            <button class="btn" style="width: 100%; border: 1px solid var(--c-border); background: var(--c-bg-card);">Upload Photo</button>
        </div>
        <hr style="width: 80%; border-top: 1px solid var(--c-border); margin: 20px auto;">
        <div style="padding: 0 20px; display: flex; flex-direction: column; gap: 10px;">
            <button class="btn btn-primary" onclick="resetForm()">➕ New Entry</button>
            <button class="btn btn-danger-outline">🗑️ Delete Entry</button>
        </div>
        <div style="margin-top: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px;">
            <a href="{{ url_for('logout') }}" class="btn" style="border: 1px solid var(--c-border); color: var(--c-text-main); text-decoration: none;">LOGOUT</a>
            <button class="btn btn-success" onclick="saveAndPDF()">SAVE & PDF</button>
        </div>
    </div>
    <div class="main-content">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h1 style="margin: 0; font-size: 24px;">Marks Entry</h1>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="search_gr" placeholder="Search GR No...">
                <button class="btn btn-primary" onclick="searchStudent()">Go</button>
            </div>
        </div>
        <div class="card" style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
            <label style="font-weight: bold;">Semester:</label>
            <select id="sem_combo" onchange="loadStructure()">
                <option value="Semester 1">Semester 1</option><option value="Semester 2">Semester 2</option>
                <option value="Semester 3">Semester 3</option><option value="Semester 4">Semester 4</option>
                <option value="Semester 5" selected>Semester 5</option><option value="Semester 6">Semester 6</option>
                <option value="Semester 7">Semester 7</option><option value="Semester 8">Semester 8</option>
            </select>
            <label style="font-weight: bold; margin-left: 20px;">Name:</label>
            <input type="text" id="student_name" style="flex: 1;" placeholder="Enter Student Name">
            <label style="font-weight: bold; margin-left: 20px;">GR No:</label>
            <input type="text" id="gr_no" style="width: 150px;">
        </div>
        <table id="marks-table">
            <thead>
                <tr>
                    <th style="text-align: left;">Subject</th>
                    <th>Cr</th><th>TH</th><th>IA</th><th>TW</th><th>OP</th><th>Total</th><th>Out</th><th>G</th><th>CG</th><th>Stat</th>
                </tr>
            </thead>
            <tbody id="marks-body"></tbody>
        </table>
        <div id="overall-stats" style="text-align: center; margin-top: 20px; font-size: 18px; font-weight: bold; color: var(--c-primary);">
            Total Credits: 0 | Total CG: 0 | SGPA: 0.00
        </div>
    </div>
</body>
</html>
